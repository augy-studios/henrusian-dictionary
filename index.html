<!doctype html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMCYFTFPEL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }
        gtag('js', new Date());

        gtag('config', 'G-FMCYFTFPEL');
    </script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9715826188316382"
        crossorigin="anonymous"></script>

    <link rel="manifest" href="/manifest.json" />

    <meta charset="utf-8">
    <title>Template | UwU Apps</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A simple template app; view live template at a glance!">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Template | UwU Apps" />
    <meta property="og:site_name" content="UwU Apps" />
    <meta property="og:description" content="A simple template app; view live template at a glance!" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Jua">
    <link rel="stylesheet" href="/style.css">
    <meta name="theme-color" content="#ccffcc" />

    <!-- Embed Image -->
    <link rel="apple-touch-icon" href="/hrd-main.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/favicon.ico">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:image:src" content="/hrd-main.png">
    <meta property="og:image" content="/hrd-main.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script defer="" src="https://use.fontawesome.com/releases/v6.5.2/js/all.js"></script>
</head>

<body>
    <!-- Header -->
    <header class="glass-header">
        <div class="header-inner">
            <div class="brand">
                <span class="brand-icon">
                    <img src="/hrd-main.png" alt="Henrusian Dictionary logo" class="brand-logo">
                </span>
                <h1 class="brand-title">Henrusian Dictionary <span class="edition-pill">13th Edition</span></h1>
            </div>
            <div class="header-actions">
                <button class="btn-icon" id="favsBtn" title="My Favourites" aria-label="My Favourites">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </button>
                <a class="btn-icon btn-coffee" href="https://donate.stripe.com/28o2akeAr3hv0DK6oo" target="_blank" rel="noopener noreferrer" title="Buy Augy a Coffee" aria-label="Buy Augy a Coffee">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>
                </a>
                <button class="btn-icon" id="themeBtn" title="Change theme" aria-label="Change theme">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Search -->
    <section class="hero">
        <div class="hero-inner">
            <p class="hero-sub">Search the Henrusian language</p>
            <div class="search-wrapper glass-card">
                <span class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </span>
                <input type="text" id="searchInput" class="search-input" placeholder="Search words, idioms, names…"
                    autocomplete="off" spellcheck="false" />
                <button class="btn-clear" id="clearBtn" title="Clear search" aria-label="Clear">✕</button>
            </div>

            <!-- Tab Nav -->
            <nav class="tab-nav" role="tablist">
                <button class="tab-btn active" data-tab="dict" role="tab" aria-selected="true">Words</button>
                <button class="tab-btn" data-tab="idioms" role="tab" aria-selected="false">Idioms</button>
                <button class="tab-btn" data-tab="names" role="tab" aria-selected="false">Names</button>
            </nav>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main-content">
        <div class="results-header">
            <span class="results-count" id="resultsCount">Loading…</span>
            <button class="btn-sort" id="sortBtn" title="Toggle sort">A→Z</button>
        </div>

        <div class="entries-grid" id="entriesGrid">
            <!-- Populated by JS -->
        </div>

        <div class="pagination hidden" id="pagination"></div>

        <div class="empty-state hidden" id="emptyState">
            <span class="empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg>
            </span>
            <p>No entries found.</p>
        </div>

        <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p>Fetching entries…</p>
        </div>
    </main>

    <!-- Entry Detail Modal -->
    <div class="modal-overlay hidden" id="entryModal" role="dialog" aria-modal="true" aria-labelledby="modalWord">
        <div class="modal glass-card">
            <button class="modal-close" id="entryModalClose" aria-label="Close">✕</button>
            <button class="modal-star" id="entryModalStar" aria-label="Add to favourites">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
            <div class="modal-tag" id="modalTag"></div>
            <div class="modal-word-row">
                <h2 class="modal-word" id="modalWord"></h2>
                <button class="btn-copy" id="copyWordBtn" aria-label="Copy word">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>
            <div class="modal-divider"></div>
            <div class="modal-def-row">
                <p class="modal-definition" id="modalDefinition"></p>
                <button class="btn-copy" id="copyDefBtn" aria-label="Copy definition">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="1em" height="1em" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>
            <div class="modal-meta" id="modalMeta"></div>
        </div>
    </div>

    <!-- Theme Picker Modal -->
    <div class="modal-overlay hidden" id="themeModal" role="dialog" aria-modal="true" aria-labelledby="themeModalTitle">
        <div class="modal glass-card theme-modal">
            <button class="modal-close" id="themeModalClose" aria-label="Close">✕</button>
            <h2 class="modal-title" id="themeModalTitle">Choose Theme</h2>
            <p class="modal-subtitle">Pick a colour palette for your dictionary experience.</p>
            <div class="theme-grid" id="themeGrid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <!-- Favourites Modal -->
    <div class="modal-overlay hidden" id="favsModal" role="dialog" aria-modal="true" aria-labelledby="favsModalTitle">
        <div class="modal glass-card favs-modal">
            <button class="modal-close" id="favsModalClose" aria-label="Close">✕</button>
            <h2 class="modal-title" id="favsModalTitle">My Favourites</h2>
            <p class="modal-subtitle" id="favsModalSubtitle"></p>
            <div class="favs-list" id="favsList">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="/script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

</body>

</html>
